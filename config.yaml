# 當前使用的模型名稱（須對應 model/ 下的資料夾名稱）
active_model: "Llama-3.1-8B-Instruct"

# 模型參數（所有模型共用的預設參數，可在 model_overrides 中覆寫）
model_defaults:
  max_new_tokens: 1024
  temperature: 0.7
  top_p: 0.9
  repetition_penalty: 1.1

# 模型特定覆寫（選填，鍵為模型名稱）
model_overrides:
  # Qwen3-8B:
  #   temperature: 0.5

# 資料設定
data:
  input_dir: "data"
  # 留空或不設定則自動掃描 data/ 下所有 .txt 和 .csv 檔案
  # 若指定則只使用列出的檔案（也可在執行時用 --datasets 參數覆寫）
  # 範例：
  #   datasets:
  #     - "rockyou-35.txt"
  #     - "000webhost.txt"
  datasets:
  - "000webhost.txt"
  processing:
    max_passwords: 1000000
    analysis_sample: 100
    batch_size: 10

# Prompt 設定
prompt:
  template: 1 # 0=預設, 1=開放, 2=嚴格, 3=簡化
  tag_summary: 0 # 0=完整標籤+允許X, 1=完整標籤+禁止新標籤
  enable_thinking: false

# 輸出設定
output:
  gen_dir: "gen"
  experiment_number: 1 # 實驗編號
  statistics_dir: "statistics" # 統計輸出目錄
